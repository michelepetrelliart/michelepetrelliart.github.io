<script>
document.addEventListener("DOMContentLoaded", () => {
    // Prendi il nome del file corrente
    const path = window.location.pathname;
    const fileName = path.substring(path.lastIndexOf('/') + 1).toLowerCase();

    // Seleziona tutti i link dentro .nav-main2
    const links = document.querySelectorAll(".nav-main2 a");

    links.forEach(link => {
        // Confronta href con file corrente (solo nome del file)
        const href = link.getAttribute("href").toLowerCase();
        if (href === fileName) {
            link.classList.add("active");
        }
    });
});
</script>

<button id="loadMore" class="load-more-btn"></button>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const items = document.querySelectorAll(".grid-item");
    const button = document.getElementById("loadMore");
    const STEP = 12;
    let visibleCount = 0;

    function showNext() {
        for (let i = visibleCount; i < visibleCount + STEP; i++) {
            if (items[i]) items[i].classList.add("visible");
        }
        visibleCount += STEP;
        if (visibleCount >= items.length) button.style.display = "none";
    }

    items.forEach((el, idx) => {
        if (idx >= STEP) el.style.display = "none";
    });
    showNext();

    button.addEventListener("click", () => {
        items.forEach((el, idx) => {
            if (idx < visibleCount + STEP) el.style.display = "flex";
        });
        showNext();
    });
});
</script>

<style>
.grid-item { display: none; flex-direction: column; align-items: center; }
.grid-item.visible { display: flex; }
